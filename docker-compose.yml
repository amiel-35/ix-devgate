version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: devgate
      POSTGRES_USER: devgate
      POSTGRES_PASSWORD: devgate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devgate"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1125:1025"  # SMTP — localhost:1125 pour api locale
      - "8125:8025"  # Web UI — http://localhost:8125
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql+psycopg://devgate:devgate@db:5432/devgate
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    volumes:
      - ./apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - ./apps/web/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001   # URL accessible depuis le navigateur
      API_INTERNAL_URL: http://api:8000            # URL interne Docker pour les Server Components
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
